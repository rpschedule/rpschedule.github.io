<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js"></script>
    <title>RP Schedule</title>
</head>

<body>
    <span class="material-symbols-rounded" id="menuOpen" onclick="openMenu();">menu</span>

    <div id="menu">
        <span class="material-symbols-rounded" id="menuClose" onclick="closeMenu();">Close</span>
    
        <div id="menu-content">
            <ul>
                <li>
                    Lorem ipsum dolor sit amet
                    <ul>
                        <li>Raypec East Middle School</li>
                        <li>Raypec South Middle School</li>
                        <li>Raypec High School</li>
                    </ul>
                </li>
                <li>consectetur, adipisicing elit</li>
            </ul>
        </div>
    </div>

    <div id="blockTime">
        <p id="time">
            <span id="hours">00</span><span id="colon1">:</span><span id="minutes">00</span><span id="colon2">:</span><span id="seconds">00</span>
        </p>
        <p id="block">
            Until <span id="blockEvent">block 3 starts</span>
        </p>
    </div>
</body>

</html>

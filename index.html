<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
        <link rel="stylesheet" href="./style.css">
        <script src="./main.js"></script>
        <title>RP Schedule</title>
    </head>
    <body>
        <img src="settingsicon.svg" onclick="settings()">

        <div id="blockTime">
            <h1 id="time">
                <div id="hours">00</div>
                <div id="colon1">:</div>
                <div id="minutes">00</div>
                <div id="colon2">:</div>
                <div id="seconds">00</div>
            </h1>
            <h3 id="block">
                Until <div id="blockEvent">block 3 starts</div>
            </h3>
        </div>

        <a id="github" href="https://github.com/rpschedule/rpschedule.github.io">github repo</a>
    </body>
</html>

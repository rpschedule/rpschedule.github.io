<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
        <link rel="stylesheet" href="./style.css">
        <script src="./main.js"></script>
        <title>RP Schedule</title>
    </head>
    <body>
        <img id="settings" src="./settingsicon.svg" width="30px" height="30px" onclick="settings()">

        <div id="blockTime">
            <h1 id="time">
                <span id="hours">00</span><span id="colon1">:</span><span id="minutes">00</span><span id="colon2">:</span><span id="seconds">00</span>
            </h1>
            <h3 id="block">
                Until <div id="blockEvent">block 3 starts</div>
            </h3>
        </div>

        <a id="github" href="https://github.com/rpschedule/rpschedule.github.io">github repo</a>
    </body>
</html>
